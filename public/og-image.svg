<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0bf5c"/>
      <stop offset="100%" stop-color="#d4a44a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0bf5c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0bf5c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="280" rx="400" ry="250" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="1200" y1="0" x2="0" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#gold)"/>

  <!-- Logo text -->
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" letter-spacing="8" fill="url(#gold)" text-transform="uppercase">
    LOL SENSEI
  </text>

  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="#e0e0e0">
    AI Coach for League of Legends
  </text>

  <!-- Subtitle -->
  <text x="600" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="300" font-size="22" fill="#a0a0a0">
    Learn champion select, builds, and strategy with real-time AI coaching
  </text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" letter-spacing="2">
    <!-- Pill 1 -->
    <rect x="250" y="420" width="180" height="40" rx="20" fill="#1a1a2e" stroke="#f0bf5c" stroke-opacity="0.3" stroke-width="1"/>
    <text x="340" y="445" text-anchor="middle" fill="#f0bf5c">FREE TO USE</text>

    <!-- Pill 2 -->
    <rect x="460" y="420" width="280" height="40" rx="20" fill="#1a1a2e" stroke="#f0bf5c" stroke-opacity="0.3" stroke-width="1"/>
    <text x="600" y="445" text-anchor="middle" fill="#f0bf5c">RIOT API COMPLIANT</text>

    <!-- Pill 3 -->
    <rect x="770" y="420" width="180" height="40" rx="20" fill="#1a1a2e" stroke="#f0bf5c" stroke-opacity="0.3" stroke-width="1"/>
    <text x="860" y="445" text-anchor="middle" fill="#f0bf5c">0 FPS IMPACT</text>
  </g>

  <!-- URL -->
  <text x="600" y="560" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#666666" letter-spacing="3">
    lolsensei.com
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#gold)"/>
</svg>
