name = "lolsensei-web"
main = ".output/server/index.mjs"
compatibility_date = "2026-04-01"

[assets]
directory = ".output/public"
binding = "ASSETS"

[env.beta]
name = "lolsensei-web-beta"
main = ".output/server/index.mjs"
routes = [
  { pattern = "beta.lolsensei.com", custom_domain = true }
]

[env.beta.assets]
directory = ".output/public"
binding = "ASSETS"
