name = "lolsensei-web"
main = ".output/server/index.mjs"
compatibility_date = "2026-04-01"

# WP24 — GDPR & Cookie Compliance
# La versione della privacy policy e' esposta al runtime via env var pubblica.
# Bump MAJOR (1.x.x -> 2.x.x) forza re-consent a tutti gli utenti (banner riappare).
# Deve combaciare con PRIVACY_POLICY_VERSION del backend (app/config.py).
[vars]
PRIVACY_POLICY_VERSION = "1.0.0"

# WP-COMMUNITY (CR-037) — public vars esposte al bundle client.
VITE_TURNSTILE_SITE_KEY = "0x4AAAAAAA-site-key"
VITE_R2_PUBLIC_BASE_URL = "https://avatars.lolsensei.com"
VITE_COMMUNITY_API_BASE = "https://api.lolsensei.com/api/community"

[assets]
directory = ".output/public"
binding = "ASSETS"
html_handling = "none"
not_found_handling = "none"

# WP30 — Web Public Presence (Summoner Pages + Tier List)
# KV namespace per stale-while-revalidate cache SSR. Creato 2026-04-26.
[[kv_namespaces]]
binding = "LOLAI_PUBLIC_CACHE"
id = "ca7b2f2b3c244514ac5f09cdeff19d57"
preview_id = "b10575187e7343d88091bb3dd9bffce5"

# [env.beta] rimosso (WP18 post-T32): vinxi cloudflare-module preset genera
# .output/server/wrangler.json (redirected config) copiando gli env sections,
# ma wrangler 4.84 rifiuta redirected configs con environments. Il worker
# lolsensei-web-beta continua a esistere autonomamente su Cloudflare dashboard.
# Per deploy canary futuri: wrangler deploy --name lolsensei-web-beta su worker
# dedicato oppure setup Cloudflare Pages branch preview.
