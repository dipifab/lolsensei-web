name = "lolsensei-web"
main = "src/worker.ts"
compatibility_date = "2026-04-01"

[assets]
directory = "./dist"
binding = "ASSETS"
# WP19: Worker custom prende in carico routing 404 + 301 trailing-slash.
# `not_found_handling = "single-page-application"` rimosso: fallback gestito da `serve404()` in `src/worker.ts`.

# Root redirect to English homepage.
# NOTE: wrangler.toml [[redirects]] is only supported for Cloudflare Pages, not Workers with assets.
# For Workers, configure this redirect via Cloudflare Dashboard:
#   Rules > Redirect Rules > Create Rule
#   When: URI Path equals "/"
#   Then: Redirect to "https://www.lolsensei.com/en/" with status 301

# ---------------------------------------------------------------------------
# WP20 beta environment (closed beta for Riot pre-submission testing).
# Deploy: npx wrangler deploy --env beta
# Public URL: https://beta.lolsensei.com
# Backend:   https://api.lolsensei.com (Cloudflare tunnel -> Mac mini)
# ---------------------------------------------------------------------------

[env.beta]
name = "lolsensei-web-beta"
main = "src/worker.ts"
routes = [
  { pattern = "beta.lolsensei.com", custom_domain = true }
]

[env.beta.assets]
directory = "./dist"
binding = "ASSETS"
