    <!-- Root locale redirect (runs only on "/"). SYNC: keep aligned with SUPPORTED_LOCALES in src/types/locale.ts -->
    <script>
      (function () {
        if (location.pathname !== '/') return;
        var SUPPORTED = ['en', 'it', 'es', 'fr', 'de', 'pt-br', 'ko', 'zh-Hans'];
        var pick = null;
        try {
          var stored = localStorage.getItem('locale');
          if (stored && SUPPORTED.indexOf(stored) !== -1) pick = stored;
        } catch (e) {}
        if (!pick) {
          var langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || 'en'];
          for (var i = 0; i < langs.length && !pick; i++) {
            var raw = (langs[i] || '').toLowerCase();
            if (raw === 'zh-cn' || raw === 'zh' || raw.indexOf('zh-hans') === 0) { pick = 'zh-Hans'; break; }
            if (raw === 'pt-br' || raw.indexOf('pt-br') === 0) { pick = 'pt-br'; break; }
            if (SUPPORTED.indexOf(raw) !== -1) { pick = raw; break; }
            var base = raw.split('-')[0];
            if (SUPPORTED.indexOf(base) !== -1) { pick = base; break; }
          }
        }
        if (!pick) pick = 'en';
        location.replace('/' + pick + '/');
      })();
    </script>

    </noscript>

    <!-- Self-hosted fonts. Manrope preloaded (headline, above-fold). Inter loads post-LCP via fonts.css @font-face with font-display:swap (WP19 P3-07 REQ-NF-019-006). -->
    <link rel="stylesheet" href="/fonts/fonts.css" />

    <!-- Conditional CJK font preload (REQ-NF-010-003) — runs before main bundle -->
    <script>
      (function () {
        var seg = location.pathname.split('/')[1];
        var href = null;
        if (seg === 'zh-Hans') href = '/fonts/noto-sans-sc-400.woff2';
        else if (seg === 'ko') href = '/fonts/noto-sans-kr-400.woff2';
        if (!href) return;
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'font';
        l.type = 'font/woff2';
        l.href = href;
        l.crossOrigin = 'anonymous';
        document.head.appendChild(l);
      })();
    </script>
