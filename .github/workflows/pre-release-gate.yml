name: Pre-release gate (WP24 TASK-4-027 + WP30 TASK-WP30-F5-07)

# Trigger su tag v*. Esegue il gate G5 aggregato:
# - Full E2E suite (@wp24 + @wp30 + altri)
# - Lighthouse CI (accessibility >=95 + perf >=90 + WP30 LCP <2.5s)
# - Bundle guard
# - Security headers E2E
# - WP30 jsonld:live + smoke-prod-wp30 (skip-graceful senza env/host prod)
# - Verifica presenza file governance: RPT (Registro Art. 30) + 4 TIA
# - Manual gate reminder (G5 Garante 10/10 manual review)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  gate:
    name: Pre-release gate G5
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # WP30 baseline gates: i18n parity (926 keys EN+IT+6 fallback), competitor
      # lint, hreflang sitemap (98 URL incl. 12 tier-list).
      - name: i18n parity gate
        run: npm run check:i18n

      - name: Competitor lint baseline
        run: bash scripts/check-competitors.sh

      - name: SEO hreflang gate
        run: npm run check:seo-hreflang

      # WP35 (CR-045 DEC-7/DEC-8) — content lint hybrid (Zod frontmatter +
      # competitor blocklist) + compile pipeline. Empty content/ tollerato
      # finche' F4 produce le 100 guide MVP. Il check-competitors.sh
      # gia' presente sotto "Competitor lint baseline" e' stato esteso
      # con --exclude-dir=content / --exclude-dir=champions (DEC-OP-018):
      # qui aggiungiamo solo il lint Zod-side e il compile.
      - name: WP35 content lint (Zod + blocklist)
        run: npm run content:lint

      - name: WP35 content compile (Markdown -> TS)
        run: npm run content:compile

      - name: Build (prod)
        env:
          VITE_GOOGLE_CLIENT_ID: ci-placeholder
          VITE_PUBLIC_PAGES_ENABLED: 'true'
        run: npm run build

      - name: WP24 bundle guard
        run: bash scripts/check-bundle-wp24.sh

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run wrangler dev (background)
        run: |
          npx wrangler dev --port 8787 --local &
          echo $! > /tmp/wrangler.pid
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8787/en/ > /dev/null; then
              break
            fi
            sleep 1
          done

      - name: Playwright WP24 full (@wp24)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
        run: npx playwright test --grep @wp24

      # WP30 TASK-WP30-F5-01..F5-06: E2E behavioural specs (skip-graceful sui
      # rami che richiedono seed Riot reali — NO mock policy). I rami
      # deterministici (region invalid, handle malformed, robots.txt, tier list
      # default) girano sempre.
      - name: Playwright WP30 (@wp30)
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8787
          WP30_SEED_SUMMONER_PATH: ${{ secrets.WP30_SEED_SUMMONER_PATH }}
          WP30_SEED_SUMMONER_PATH_EUW1: ${{ secrets.WP30_SEED_SUMMONER_PATH_EUW1 }}
          WP30_SEED_SUMMONER_PATH_NA1: ${{ secrets.WP30_SEED_SUMMONER_PATH_NA1 }}
          WP30_SEED_SUMMONER_PATH_KR: ${{ secrets.WP30_SEED_SUMMONER_PATH_KR }}
          WP30_SEED_PRIVATE_SUMMONER_PATH: ${{ secrets.WP30_SEED_PRIVATE_SUMMONER_PATH }}
          WP30_SEED_INACTIVE_SUMMONER_PATH: ${{ secrets.WP30_SEED_INACTIVE_SUMMONER_PATH }}
          WP30_SEED_NOT_FOUND_PATH: ${{ secrets.WP30_SEED_NOT_FOUND_PATH }}
        run: npx playwright test --grep @wp30

      - name: Stop wrangler
        if: always()
        run: kill $(cat /tmp/wrangler.pid) || true

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Lighthouse CI (accessibility >=95 + WP30 tier-list LCP <2.5s)
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      # WP30 TASK-WP30-F3-04: JSON-LD live probe contro production-like URL.
      # Skip-graceful via WP30_SEED_SUMMONER_URL non settata (NO mock).
      # Gating on repo variable WP30_JSONLD_LIVE_ENABLED to keep the gate
      # opt-in mentre i seed reali sono in fase di provisioning founder-side.
      - name: WP30 JSON-LD live check
        if: ${{ vars.WP30_JSONLD_LIVE_ENABLED == 'true' }}
        env:
          WP30_SEED_SUMMONER_URL: ${{ secrets.WP30_SEED_SUMMONER_URL }}
        run: npm run check:jsonld:live

      # WP30 TASK-WP30-F4-07: smoke-prod-wp30 contro production URL.
      # Auto skip-on-localdev (lo script rileva PROD_HOST localhost e exit 0).
      # In CI gira solo quando vars.WP30_SMOKE_PROD_ENABLED=true e
      # secrets.WP30_PROD_HOST e' settato (production-like).
      - name: WP30 smoke-prod
        if: ${{ vars.WP30_SMOKE_PROD_ENABLED == 'true' }}
        env:
          PROD_HOST: ${{ secrets.WP30_PROD_HOST }}
        run: npm run smoke:prod:wp30

      - name: Governance files present (G7 + G8)
        run: |
          set -e
          missing=0
          for f in \
            "../architecture-repository/privacy/records-of-processing.md" \
            "../architecture-repository/privacy/tia/tia-cloudflare.md" \
            "../architecture-repository/privacy/tia/tia-stripe.md" \
            "../architecture-repository/privacy/tia/tia-anthropic.md" \
            "../architecture-repository/privacy/tia/tia-db-provider.md"
          do
            if [ ! -f "$f" ]; then
              echo "[FAIL] missing governance file: $f" >&2
              missing=1
            else
              echo "[OK] $f"
            fi
          done
          # WP24 Fase 5 non ancora completato: segnala ma non failare finche' Fase 5 chiude
          if [ "$missing" -ne 0 ]; then
            echo "::warning::Governance files mancanti. Completa TASK-5-002..006 prima del tag definitivo."
          fi

      - name: Manual gate reminder (G5)
        run: |
          echo "::notice::G5 Garante 10/10 manual review: verificare docs/wp24-garante-g5.md sign-off prima del deploy."
